<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart — Booktopia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Quantity stepper */
    .qty-control {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .qty-btn {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      line-height: 1;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: var(--offwhite);
      color: var(--charcoal);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
    }

    .qty-btn:hover {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .qty-input {
      width: 46px;
      text-align: center;
      padding: 3px 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--charcoal);
      outline: none;
      /* Hide native number arrows */
      -moz-appearance: textfield;
    }

    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qty-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-glow);
    }

    /* Book detail modal */
    .modal--book {
      max-width: 620px;
      width: 92vw;
      padding: 2rem;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .modal-close:hover {
      color: var(--charcoal);
      background: var(--offwhite);
    }

    .modal-book-layout {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .modal-book-cover img {
      width: 130px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .modal-book-info {
      flex: 1;
    }

    .modal-book-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      margin: 0 0 0.3rem;
      color: var(--charcoal);
    }

    .modal-book-author {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0 0 0.5rem;
    }

    .modal-book-price {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--teal);
      margin: 0 0 0.6rem;
    }

    .modal-book-desc {
      font-size: 0.88rem;
      color: var(--charcoal);
      line-height: 1.6;
      margin-top: 0.75rem;
    }

    .modal-loading {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 480px) {
      .modal-book-layout { flex-direction: column; }
      .modal-book-cover img { width: 100%; max-width: 200px; }
    }
  </style>
</head>
<body class="page-body">

<!-- Navbar injected by navbar.js -->

<main class="page-main">
  <div class="page-header">
    <h1 class="page-title">Shopping Cart</h1>
  </div>

  <div class="page-controls">
    <div class="select-wrap">
      <label class="select-label" for="userDropdown">Viewing cart for</label>
      <div class="select-field-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <select id="userDropdown">
          <option value="">— select user —</option>
        </select>
        <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>

  <div id="cart" class="data-container">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <p>Select a user to view their cart</p>
    </div>
  </div>

  <div class="page-footer-actions">
    <button id="checkoutBtn" class="btn-action btn-action--primary" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/></svg>
      Checkout Selected
    </button>
  </div>
</main>

<!-- Modal container for book detail view -->
<div id="cartModalContainer"></div>

<script src="/js/navbar.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
