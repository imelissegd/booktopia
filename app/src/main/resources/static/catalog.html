<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Catalog — Booktopia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @media (max-width: 1024px) {
      #bookList { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 640px) {
      #bookList { grid-template-columns: repeat(2, 1fr); }
    }
    #bookList .book .category-badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      margin: 6px 0 10px;
    }

    .category-badge {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--offwhite);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    #bookList .book {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    #bookList .book .book-actions {
      margin-top: auto;
    }

    #bookList {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .book-actions--locked button {
      opacity: 0.45;
      pointer-events: auto;
      cursor: not-allowed;
    }

    /* List view — override for bookList specifically */
    #bookList.list-view {
      display: block;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
  </style>
</head>
<body class="catalog-body">

<div id="navbar"></div>

<main class="catalog-main">
  <div style="display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto 0.25rem;padding:0 20px">
    <h1 style="margin:0">Browse Books</h1>
    <a id="addBookBtn" href="add-book.html" class="btn-action btn-action--primary" style="display:none;text-decoration:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Book
    </a>
  </div>

  <div class="catalog-controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search by title or author…"
              oninput="applyFilters()"
              autocomplete="off"
      >
    </div>
    <div class="category-wrap">
      <select id="categoryFilter" class="category-select" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option value="FICTION">Fiction</option>
        <option value="NON_FICTION">Non-Fiction</option>
        <option value="SCIENCE">Science</option>
        <option value="TECHNOLOGY">Technology</option>
        <option value="HISTORY">History</option>
        <option value="ROMANCE">Romance</option>
        <option value="FANTASY">Fantasy</option>
      </select>
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <!-- Status filter: shown in manage mode only -->
    <div class="category-wrap" id="statusFilterWrap" style="display:none">
      <select id="statusFilter" class="category-select" onchange="applyFilters()">
        <option value="all">All</option>
        <option value="active">Active</option>
        <option value="delisted">Delisted</option>
      </select>
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <!-- View toggle -->
    <div class="view-toggle">
      <button class="view-toggle-btn active" id="gridViewBtn" title="Grid view" onclick="setView('grid')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-toggle-btn" id="listViewBtn" title="List view" onclick="setView('list')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
  </div>

  <p id="resultsCount" class="results-count"></p>

  <div id="bookList"></div>
  <div id="pagination" class="pagination"></div>
</main>

<div id="modalContainer"></div>

<script src="/js/navbar.js"></script>
<script src="/js/admin-sidebar.js"></script>
<script src="/js/book-modal.js"></script>
<script src="/js/catalog.js"></script>
</body>
</html>
